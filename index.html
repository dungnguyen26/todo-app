<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>App Tổng Hợp</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.wrapper {
    max-width: 1000px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

/* ĐỀ BÀI */
.debai {
    background: #f0f4ff;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
    border-left: 4px solid #667eea;
}

/* PT */
.form-group {
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
}

.form-group input {
    flex: 1;
    padding: 6px;
}

.solve-btn {
    width: 100%;
    background: #4CAF50;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
}

.ketqua {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
}

/* TODO */
.form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
}

.form input {
    padding: 8px;
}

.add-btn {
    background: #667eea;
    color: white;
    border: none;
    padding: 8px;
}

.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.filters button {
    flex: 1;
    background: #667eea;
    color: white;
    border: none;
    padding: 8px;
}

/* GRID */
.header, .task {
    display: grid;
    grid-template-columns: 60px 2fr 2fr 120px 80px;
    align-items: center;
    text-align: center;
}

.header {
    font-weight: bold;
    margin-bottom: 10px;
}

.task {
    padding: 10px;
    border-top: 1px solid #ddd;
}

.done {
    text-decoration: line-through;
    color: gray;
}

.status-btn {
    background: orange;
    color: white;
    border: none;
    padding: 5px;
}

.done-btn {
    background: green;
    color: white;
    border: none;
    padding: 5px;
}

.delete-btn {
    background: red;
    color: white;
    border: none;
    padding: 5px;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- GIẢI PT -->
<div class="box">
    <h2>Giải phương trình bậc 2</h2>

    <div class="debai">
        <b>📘 Đề bài:</b><br>
        Nhập a, b, c. Giải: <b>ax² + bx + c = 0</b>
    </div>

    <div class="form-group">
        <label>a:</label>
        <input type="number" id="a">
    </div>

    <div class="form-group">
        <label>b:</label>
        <input type="number" id="b">
    </div>

    <div class="form-group">
        <label>c:</label>
        <input type="number" id="c">
    </div>

    <button class="solve-btn" onclick="giai()">Giải</button>
    <div class="ketqua" id="ketqua"></div>
</div>

<!-- TODO -->
<div class="box">
    <h2>⏳ To-Do List by Dũng Nguyễn </h2>

    <div class="form">
        <input type="text" id="taskName" placeholder="Tên công việc">
        <input type="date" id="deadline">
        <input type="time" id="startTime">
        <input type="time" id="endTime">
        <button class="add-btn" onclick="addTask()">Thêm</button>
    </div>

    <div class="filters">
        <button onclick="setFilter('all')">Tất cả</button>
        <button onclick="setFilter('done')">Hoàn thành</button>
        <button onclick="setFilter('todo')">Chưa xong</button>
    </div>

    <div class="header">
        <div>STT</div>
        <div>Tên</div>
        <div>Thời gian</div>
        <div>Trạng thái</div>
        <div>Xóa</div>
    </div>

    <div id="taskList"></div>
</div>

</div>

<script>
// ===== GIẢI PT =====
function giai() {
    let aVal = parseFloat(document.getElementById("a").value);
    let bVal = parseFloat(document.getElementById("b").value);
    let cVal = parseFloat(document.getElementById("c").value);

    if (isNaN(aVal) || isNaN(bVal) || isNaN(cVal)) {
        ketqua.innerHTML = "⚠️ Nhập đủ!";
        return;
    }

    if (aVal == 0) {
        ketqua.innerHTML = "PT bậc 1: x = " + (-cVal/bVal);
        return;
    }

    let d = bVal*bVal - 4*aVal*cVal;

    if (d > 0) {
        ketqua.innerHTML = `x1=${(-bVal+Math.sqrt(d))/(2*aVal)}, x2=${(-bVal-Math.sqrt(d))/(2*aVal)}`;
    } else if (d == 0) {
        ketqua.innerHTML = "x=" + (-bVal/(2*aVal));
    } else {
        ketqua.innerHTML = "Vô nghiệm";
    }
}

// ===== TODO =====
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";

function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    let name = document.getElementById("taskName").value;
    let deadlineValue = document.getElementById("deadline").value;
    let start = document.getElementById("startTime").value;
    let end = document.getElementById("endTime").value;

    if (!name || !deadlineValue || !start || !end) {
        alert("Nhập đủ nhé!");
        return;
    }

    tasks.push({ name, deadline: deadlineValue, start, end, done:false });
    save();
    render();

    document.getElementById("taskName").value = "";
    document.getElementById("deadline").value = "";
    document.getElementById("startTime").value = "";
    document.getElementById("endTime").value = "";
}

function toggleTask(i) {
    tasks[i].done = !tasks[i].done;
    save();
    render();
}

function deleteTask(i) {
    tasks.splice(i,1);
    save();
    render();
}

function setFilter(f) {
    filter = f;
    render();
}

function render() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((t,i)=>{
        if(filter==="done" && !t.done) return;
        if(filter==="todo" && t.done) return;

        list.innerHTML += `
        <div class="task">
            <div>${i+1}</div>
            <div class="${t.done?'done':''}">${t.name}</div>
            <div class="${t.done?'done':''}">
                ${t.deadline}<br>
                ${t.start} - ${t.end}
            </div>
            <div>
                <button class="${t.done?'done-btn':'status-btn'}"
                    onclick="toggleTask(${i})">
                    ${t.done ? 'Xong' : 'Chưa xong'}
                </button>
            </div>
            <div>
                <button class="delete-btn" onclick="deleteTask(${i})">X</button>
            </div>
        </div>`;
    });
}

render();
</script>

</body>
</html>
