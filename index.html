<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giải phương trình bậc 2</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }
        input, button {
            padding: 8px;
            margin: 5px;
        }
        .ketqua {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Giải phương trình bậc 2: ax² + bx + c = 0</h2>

<label>Nhập a:</label>
<input type="number" id="a"><br>

<label>Nhập b:</label>
<input type="number" id="b"><br>

<label>Nhập c:</label>
<input type="number" id="c"><br>

<button onclick="giai()">Giải</button>

<div class="ketqua" id="ketqua"></div>

<script>
function giaiPTBac2(a, b, c) {
    if (a == 0) {
        if (b == 0) {
            return (c == 0) ? "Vô số nghiệm" : "Vô nghiệm";
        } else {
            return "Phương trình bậc 1, x = " + (-c / b);
        }
    }

    let delta = b*b - 4*a*c;

    if (delta > 0) {
        let x1 = (-b + Math.sqrt(delta)) / (2*a);
        let x2 = (-b - Math.sqrt(delta)) / (2*a);
        return "Hai nghiệm: x1 = " + x1 + ", x2 = " + x2;
    } else if (delta == 0) {
        let x = -b / (2*a);
        return "Nghiệm kép: x = " + x;
    } else {
        return "Vô nghiệm";
    }
}

function giai() {
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

    let ketQua = giaiPTBac2(a, b, c);
    document.getElementById("ketqua").innerHTML = ketQua;
}
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>To-Do List Pro</title>
    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        input, button, select {
            padding: 8px;
            margin: 5px;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        .add-btn {
            background: #28a745;
            color: white;
        }

        .delete-btn {
            background: red;
            color: white;
        }

        .filters button {
            background: #007bff;
            color: white;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 To-Do List PRO</h2>

    <input type="text" id="taskName" placeholder="Tên công việc">
    <input type="date" id="deadline">
    <button class="add-btn" onclick="addTask()">Thêm</button>

    <div class="filters">
        <button onclick="filterTasks('all')">Tất cả</button>
        <button onclick="filterTasks('done')">Hoàn thành</button>
        <button onclick="filterTasks('todo')">Chưa xong</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Tên</th>
                <th>Deadline</th>
                <th>✔</th>
                <th>Xóa</th>
            </tr>
        </thead>
        <tbody id="taskList"></tbody>
    </table>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let currentFilter = "all";

    function saveTasks() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function addTask() {
        let name = document.getElementById("taskName").value;
        let deadline = document.getElementById("deadline").value;

        if (!name || !deadline) {
            alert("Nhập đầy đủ nhé!");
            return;
        }

        tasks.push({
            name,
            deadline,
            done: false
        });

        saveTasks();
        renderTasks();

        document.getElementById("taskName").value = "";
        document.getElementById("deadline").value = "";
    }

    function toggleTask(index) {
        tasks[index].done = !tasks[index].done;
        saveTasks();
        renderTasks();
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        saveTasks();
        renderTasks();
    }

    function filterTasks(type) {
        currentFilter = type;
        renderTasks();
    }

    function renderTasks() {
        let list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach((task, index) => {

            if (currentFilter === "done" && !task.done) return;
            if (currentFilter === "todo" && task.done) return;

            let row = `
                <tr>
                    <td class="${task.done ? 'done' : ''}">${task.name}</td>
                    <td class="${task.done ? 'done' : ''}">${task.deadline}</td>
                    <td>
                        <input type="checkbox" ${task.done ? "checked" : ""} 
                        onclick="toggleTask(${index})">
                    </td>
                    <td>
                        <button class="delete-btn" onclick="deleteTask(${index})">X</button>
                    </td>
                </tr>
            `;

            list.innerHTML += row;
        });
    }

    renderTasks();
</script>

</body>
</html>
