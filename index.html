<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>App Tổng Hợp</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* WRAPPER */
.wrapper {
    max-width: 900px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

/* BOX CHUNG */
.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* ===== PT BẬC 2 ===== */
h2 {
    text-align: center;
}

/* ĐỀ BÀI */
.debai {
    background: #f0f4ff;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
    font-size: 14px;
    border-left: 4px solid #667eea;
}

.form-group {
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
}

.form-group input {
    flex: 1;
    padding: 6px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.ketqua {
    margin-top: 10px;
    text-align: center;
    font-weight: bold;
}

/* ===== TODO ===== */
.form {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.form input {
    flex: 1;
    padding: 8px;
}

.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.filters button {
    flex: 1;
    background: #667eea;
}

.header, .task {
    display: grid;
    grid-template-columns: 2fr 1fr 80px 80px;
    align-items: center;
}

.header {
    font-weight: bold;
    margin-bottom: 10px;
}

.task {
    padding: 10px;
    border-top: 1px solid #ddd;
}

.done {
    text-decoration: line-through;
    color: gray;
}

.delete-btn {
    background: red;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- BOX 1: GIẢI PT -->
    <div class="box">
        <h2>Giải phương trình bậc 2</h2>

        <div class="debai">
            <b>📘 Đề bài:</b><br>
            Nhập 3 số <b>a, b, c</b>. Giải phương trình:<br>
            <b>ax² + bx + c = 0</b>
        </div>

        <div class="form-group">
            <label>a:</label>
            <input type="number" id="a">
        </div>

        <div class="form-group">
            <label>b:</label>
            <input type="number" id="b">
        </div>

        <div class="form-group">
            <label>c:</label>
            <input type="number" id="c">
        </div>

        <button onclick="giai()">Giải</button>

        <div class="ketqua" id="ketqua"></div>
    </div>

    <!-- BOX 2: TODO -->
    <div class="box">
        <h2>🚀 To-Do List by Dũng Nguyễn</h2>

        <div class="form">
            <input type="text" id="taskName" placeholder="Tên công việc">
            <input type="date" id="deadline">
            <button onclick="addTask()">Thêm</button>
        </div>

        <div class="filters">
            <button onclick="setFilter('all')">Tất cả</button>
            <button onclick="setFilter('done')">Hoàn thành</button>
            <button onclick="setFilter('todo')">Chưa xong</button>
        </div>

        <div class="header">
            <div>Tên</div>
            <div>Deadline</div>
            <div>✔</div>
            <div>Xóa</div>
        </div>

        <div id="taskList"></div>
    </div>

</div>

<script>
// ===== GIẢI PT =====
function giai() {
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

    if (isNaN(a) || isNaN(b) || isNaN(c)) {
        ketqua.innerHTML = "⚠️ Nhập đầy đủ!";
        return;
    }

    if (a == 0) {
        ketqua.innerHTML = "PT bậc 1: x = " + (-c/b);
        return;
    }

    let d = b*b - 4*a*c;

    if (d > 0) {
        let x1 = (-b + Math.sqrt(d))/(2*a);
        let x2 = (-b - Math.sqrt(d))/(2*a);
        ketqua.innerHTML = `Hai nghiệm: x1 = ${x1}, x2 = ${x2}`;
    } else if (d == 0) {
        ketqua.innerHTML = "Nghiệm kép: x = " + (-b/(2*a));
    } else {
        ketqua.innerHTML = "Vô nghiệm";
    }
}

// ===== TODO =====
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";

function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    let name = taskName.value;
    let deadline = document.getElementById("deadline").value;

    if (!name || !deadline) return;

    tasks.push({name, deadline, done:false});
    save();
    render();

    taskName.value = "";
    deadline.value = "";
}

function setFilter(f) {
    filter = f;
    render();
}

function toggleTask(i) {
    tasks[i].done = !tasks[i].done;
    save();
    render();
}

function deleteTask(i) {
    tasks.splice(i,1);
    save();
    render();
}

function render() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((t,i)=>{
        if(filter==="done" && !t.done) return;
        if(filter==="todo" && t.done) return;

        list.innerHTML += `
        <div class="task">
            <div class="${t.done?'done':''}">${t.name}</div>
            <div class="${t.done?'done':''}">${t.deadline}</div>
            <div><input type="checkbox" ${t.done?'checked':''} onclick="toggleTask(${i})"></div>
            <div><button class="delete-btn" onclick="deleteTask(${i})">X</button></div>
        </div>`;
    });
}

render();
</script>

</body>
</html>
