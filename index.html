<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>App Của Dũng</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

/* INPUT */
input {
    padding: 8px;
    width: 100%;
}

/* BUTTON */
button {
    padding: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* ===== PT ===== */
.solve-btn {
    background: #4CAF50;
    color: white;
    width: 100%;
}

.ketqua {
    margin-top: 10px;
    font-weight: bold;
}

/* ===== TODO ===== */
.form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.form input {
    flex: 1;
}

.form button {
    background: #667eea;
    color: white;
}

/* FILTER */
.filters {
    display: flex;
    gap: 10px;
    margin: 10px 0;
}

.filters button {
    flex: 1;
}

/* GRID */
.header, .task {
    display: grid;
    grid-template-columns: 60px 2fr 2fr 60px 120px 80px;
    align-items: center;
}

.header {
    font-weight: bold;
    margin-top: 10px;
}

.task {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}

.done {
    text-decoration: line-through;
    color: gray;
}

.delete-btn {
    background: red;
    color: white;
}

.restore-btn {
    background: green;
    color: white;
}

input[type="checkbox"] {
    transform: scale(1.3);
}
</style>
</head>

<body>

<div class="container">

<!-- ===== GIẢI PT ===== -->
<div class="box">
    <h2>Giải phương trình bậc 2</h2>
    <p><b>Đề bài:</b> ax² + bx + c = 0</p>

    <input type="number" id="a" placeholder="a"><br><br>
    <input type="number" id="b" placeholder="b"><br><br>
    <input type="number" id="c" placeholder="c"><br><br>

    <button class="solve-btn" onclick="giai()">Giải</button>

    <div class="ketqua" id="ketqua"></div>
</div>

<!-- ===== TODO ===== -->
<div class="box">
    <h2>⏳ To-Do List by Dũng Nguyễn</h2>

    <div class="form">
        <input type="text" id="taskName" placeholder="Tên công việc">
        <input type="date" id="deadline">
        <input type="time" id="startTime">
        <input type="time" id="endTime">
        <button onclick="addTask()">Thêm</button>
    </div>

    <div class="filters">
        <button onclick="setFilter('all')">Tất cả</button>
        <button onclick="setFilter('done')">Hoàn thành</button>
        <button onclick="setFilter('todo')">Chưa xong</button>
    </div>

    <div class="header">
        <div>STT</div>
        <div>Tên</div>
        <div>Thời gian</div>
        <div>✔</div>
        <div>Trạng thái</div>
        <div>Xóa</div>
    </div>

    <div id="taskList"></div>
</div>

<!-- ===== THÙNG RÁC ===== -->
<div class="box">
    <h2>🗑️ Đã xoá gần đây</h2>
    <div id="deletedList"></div>
</div>

</div>

<script>
/* ===== GIẢI PT ===== */
function giai() {
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

    if (isNaN(a) || isNaN(b) || isNaN(c)) {
        document.getElementById("ketqua").innerHTML = "Nhập đủ a, b, c!";
        return;
    }

    let d = b*b - 4*a*c;

    if (a == 0) {
        document.getElementById("ketqua").innerHTML = "Phương trình bậc 1";
    } else if (d > 0) {
        document.getElementById("ketqua").innerHTML = "Có 2 nghiệm";
    } else if (d == 0) {
        document.getElementById("ketqua").innerHTML = "Nghiệm kép";
    } else {
        document.getElementById("ketqua").innerHTML = "Vô nghiệm";
    }
}

/* ===== TODO ===== */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let deletedTasks = JSON.parse(localStorage.getItem("deletedTasks")) || [];
let filter = "all";

function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    let name = document.getElementById("taskName").value;
    let deadlineValue = document.getElementById("deadline").value;
    let start = document.getElementById("startTime").value;
    let end = document.getElementById("endTime").value;

    if (!name || !deadlineValue || !start || !end) {
        alert("Nhập đủ nhé!");
        return;
    }

    tasks.push({
        name: name,
        deadline: deadlineValue,
        start: start,
        end: end,
        done: false
    });

    save();
    render();

    document.getElementById("taskName").value = "";
    document.getElementById("deadline").value = "";
    document.getElementById("startTime").value = "";
    document.getElementById("endTime").value = "";
}

function setFilter(f) {
    filter = f;
    render();
}

function toggleTask(i) {
    tasks[i].done = !tasks[i].done;
    save();
    render();
}

function deleteTask(i) {
    deletedTasks.push(tasks[i]);
    tasks.splice(i,1);

    localStorage.setItem("deletedTasks", JSON.stringify(deletedTasks));
    save();
    render();
    renderDeleted();
}

function restoreTask(i) {
    tasks.push(deletedTasks[i]);
    deletedTasks.splice(i,1);

    localStorage.setItem("deletedTasks", JSON.stringify(deletedTasks));
    save();
    render();
    renderDeleted();
}

function deleteForever(i) {
    deletedTasks.splice(i,1);
    localStorage.setItem("deletedTasks", JSON.stringify(deletedTasks));
    renderDeleted();
}

function render() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((t,i)=>{
        if(filter==="done" && !t.done) return;
        if(filter==="todo" && t.done) return;

        list.innerHTML += `
        <div class="task">
            <div>${i+1}</div>
            <div class="${t.done?'done':''}">${t.name}</div>
            <div class="${t.done?'done':''}">
                ${t.deadline}<br>${t.start} - ${t.end}
            </div>
            <div>
                <input type="checkbox" ${t.done?'checked':''} onclick="toggleTask(${i})">
            </div>
            <div>${t.done?'🟢 Xong':'🟠 Chưa xong'}</div>
            <div><button class="delete-btn" onclick="deleteTask(${i})">X</button></div>
        </div>`;
    });
}

function renderDeleted() {
    let list = document.getElementById("deletedList");
    list.innerHTML = "";

    deletedTasks.forEach((t,i)=>{
        list.innerHTML += `
        <div class="task">
            <div>${i+1}</div>
            <div>${t.name}</div>
            <div>${t.deadline}<br>${t.start} - ${t.end}</div>
            <div><button class="restore-btn" onclick="restoreTask(${i})">♻️</button></div>
            <div><button class="delete-btn" onclick="deleteForever(${i})">🗑️</button></div>
        </div>`;
    });
}

render();
renderDeleted();
</script>

</body>
</html>
